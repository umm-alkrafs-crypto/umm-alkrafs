<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="meta-viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة أم الكرفس الإخبارية</title>
    <!-- تضمين مكتبة Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary-color: #2e7d32;
            --secondary-color: #388e3c;
            --bg-color: #f1f8e9;
            --card-bg: #ffffff;
            --text-color: #1b5e20;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: #333;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: var(--primary-color);
            color: white;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            position: relative;
        }

        header h1 {
            margin: 0;
            font-size: 2.5rem;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
        }

        /* جعل زر تسجيل الدخول مخفياً تماماً في البداية */
        #secret-login-trigger {
            display: none;
            position: absolute;
            top: 20px;
            left: 20px;
            background-color: white;
            color: var(--primary-color);
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        .container {
            max-width: 800px;
            margin: 30px auto;
            padding: 0 20px;
        }

        /* نافذة تسجيل الدخول */
        .auth-container {
            display: none;
            background: var(--card-bg);
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-bottom: 30px;
            border: 2px solid var(--primary-color);
        }

        .auth-container h2 {
            margin-top: 0;
            color: var(--primary-color);
        }

        .auth-container input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }

        /* لوحة التحكم بالنشر */
        #admin-panel {
            display: none;
            background: var(--card-bg);
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: var(--text-color);
        }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }

        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            width: 100%;
        }

        button:hover {
            background-color: var(--secondary-color);
        }

        .logout-btn {
            background-color: #d32f2f;
            margin-top: 10px;
        }
        .logout-btn:hover {
            background-color: #c62828;
        }

        /* عرض الأخبار */
        .news-card {
            background: var(--card-bg);
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            margin-bottom: 25px;
            overflow: hidden;
            border-right: 5px solid var(--primary-color);
            position: relative;
        }

        .news-img {
            width: 100%;
            max-height: 400px;
            object-fit: cover;
        }

        .news-content {
            padding: 20px;
        }

        .news-title {
            margin: 0 0 10px 0;
            color: var(--text-color);
            font-size: 1.8rem;
        }

        .news-summary {
            color: #555;
            line-height: 1.6;
        }

        .news-date {
            font-size: 0.85rem;
            color: #888;
            margin-top: 15px;
        }

        .delete-news-btn {
            position: absolute;
            top: 10px;
            left: 10px;
            background-color: #d32f2f;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 0.8rem;
            width: auto;
        }
    </style>
</head>
<body>

    <header>
        <!-- عند الضغط على هذا العنوان 5 مرات سيظهر الزر السري -->
        <h1 id="secret-header" onclick="countSecretClicks()">منصة أم الكرفس الإخبارية</h1>
        <button id="secret-login-trigger" onclick="toggleAuthForm()">تسجيل الدخول</button>
    </header>

    <div class="container">
        
        <!-- واجهة تسجيل الدخول البيومترية/البريدية -->
        <div id="auth-form" class="auth-container">
            <h2>تسجيل دخول الإدارة</h2>
            <input type="email" id="login-email" placeholder="البريد الإلكتروني">
            <input type="password" id="login-password" placeholder="كلمة المرور">
            <button onclick="login()">دخول</button>
        </div>

        <!-- لوحة التحكم (تظهر فقط للمدير بعد تسجيل الدخول) -->
        <div id="admin-panel">
            <h2>لوحة إدارة الأخبار</h2>
            <div class="form-group">
                <label>عنوان الخبر</label>
                <input type="text" id="news-title" placeholder="أدخل العنوان المثير...">
            </div>
            <div class="form-group">
                <label>نص الخبر التفصيلي</label>
                <textarea id="news-summary" rows="5" placeholder="اكتب تفاصيل الخبر هنا..."></textarea>
            </div>
            <div class="form-group">
                <label>رابط الصورة المباشر (ImgBB)</label>
                <input type="text" id="news-image" placeholder="https://i.ibb.co/xxxxx/image.jpg">
            </div>
            <button onclick="publishNews()">نشر الخبر الآن 🚀</button>
            <button class="logout-btn" onclick="logout()">تسجيل الخروج 🔒</button>
        </div>

        <!-- مكان عرض الأخبار للجمهور -->
        <div id="news-feed">
            <p style="text-align: center; color: #888;">جاري تحميل آخر الأخبار العاجلة...</p>
        </div>
    </div>

    <script>
        // إعدادات الاتصال بقاعدة البيانات المؤمنة الخاصة بك
        const SUPABASE_URL = "https://umm-alkrafs-cryptoband.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVtbS1hbGtyYWZzLWNyeXB0b2JhbmQiLCJyb2xlIjoiYW5vbiIsImlhdCI6MTc1MTI0MTE5MSwiZXhwIjoyMDY2ODE3MTkxfQ.E1eZ7-S0-rPclP8X5z_R4U6XmI2G4vRIn7z7U3pE67I";
        
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let clickCount = 0;
        let clickTimeout;

        // دالة العداد السري لمنع المتطفلين
        function countSecretClicks() {
            clickCount++;
            clearTimeout(clickTimeout);
            
            // إذا لم يكمل الضغطات خلال 3 ثوانٍ يصفر العداد
            clickTimeout = setTimeout(() => { clickCount = 0; }, 3000);

            if (clickCount === 5) {
                const triggerBtn = document.getElementById('secret-login-trigger');
                triggerBtn.style.display = 'block';
                alert('🔓 تم إظهار زر تسجيل الدخول بنجاح!');
                clickCount = 0;
            }
        }

        function toggleAuthForm() {
            const form = document.getElementById('auth-form');
            form.style.display = form.style.display === 'block' ? 'none' : 'block';
        }

        // دالة تسجيل الدخول الآمنة عبر السيرفر
        async function login() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;

            const { data, error } = await supabase.auth.signInWithPassword({ email, password });

            if (error) {
                alert('خطأ في بيانات الدخول! حاول مجدداً.');
            } else {
                alert('أهلاً بك يا مدير! تم التحقق بنجاح 🔓');
                document.getElementById('auth-form').style.display = 'none';
                document.getElementById('secret-login-trigger').style.display = 'none';
                checkUser();
            }
        }

        // دالة تسجيل الخروج وقفل اللوحة
        async function logout() {
            await supabase.auth.signOut();
            alert('تم قفل لوحة التحكم وتأمين المنصة بنجاح 🔒');
            document.getElementById('admin-panel').style.display = 'none';
            location.reload();
        }

        // فحص حالة الجلسة للتأكد هل أنت مسجل دخول أم لا
        async function checkUser() {
            const { data: { user } } = await supabase.auth.getUser();
            if (user) {
                document.getElementById('admin-panel').style.display = 'block';
                loadNews(true); // تحميل مع أزرار الحذف للمدير
            } else {
                loadNews(false); // تحميل للقراء بدون أزرار الحذف
            }
        }

        // جلب الأخبار من قاعدة البيانات وعرضها للجميع بالترتيب التنازلي
        async function loadNews(isAdmin) {
            const { data: news, error } = await supabase
                .from('news')
                .select('*')
                .order('id', { ascending: false });

            const feed = document.getElementById('news-feed');
            if (error) {
                feed.innerHTML = '<p style="text-align:center; color:red;">حدث خطأ أثناء تحميل الأخبار.</p>';
                return;
            }

            if (news.length === 0) {
                feed.innerHTML = '<p style="text-align:center; color:#888;">لا توجد أخبار منشورة حالياً.</p>';
                return;
            }

            feed.innerHTML = '';
            news.forEach(item => {
                const date = item.created_at ? new Date(item.created_at).toLocaleDateString('ar-EG') : 'اليوم';
                let imgTag = item.image ? `<img class="news-img" src="${item.image}" alt="صورة الخبر">` : '';
                let deleteBtn = isAdmin ? `<button class="delete-news-btn" onclick="deleteNews(${item.id})">حذف 🗑️</button>` : '';

                feed.innerHTML += `
                    <div class="news-card">
                        ${deleteBtn}
                        ${imgTag}
                        <div class="news-content">
                            <h3 class="news-title">${item.title}</h3>
                            <p class="news-summary">${item.summary}</p>
                            <div class="news-date">📅 نُشر في: ${date}</div>
                        </div>
                    </div>
                `;
            });
        }

        // نشر خبر جديد إلى السيرفر المحمي
        async function publishNews() {
            const title = document.getElementById('news-title').value;
            const summary = document.getElementById('news-summary').value;
            const image = document.getElementById('news-image').value;

            if (!title || !summary) {
                alert('من فضلك املأ العنوان والتفاصيل أولاً!');
                return;
            }

            const { error } = await supabase
                .from('news')
                .insert([{ title, summary, image }]);

            if (error) {
                alert('فشل النشر: تأكد من تسجيل دخولك وأن السيرفر محمي.');
            } else {
                alert('تم نشر الخبر بنجاح كبير! 🎉');
                document.getElementById('news-title').value = '';
                document.getElementById('news-summary').value = '';
                document.getElementById('news-image').value = '';
                checkUser();
            }
        }

        // دالة حذف الخبر للمدير
        async function deleteNews(id) {
            if (confirm('هل أنت متأكد من رغبتك في حذف هذا الخبر نهائياً؟')) {
                const { error } = await supabase
                    .from('news')
                    .delete()
                    .eq('id', id);

                if (error) {
                    alert('فشل في الحذف!');
                } else {
                    alert('تم حذف الخبر بنجاح.');
                    checkUser();
                }
            }
        }

        // تشغيل الفحص التلقائي والأخبار عند فتح الصفحة
        checkUser();
    </script>
</body>
</html>
